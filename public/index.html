<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ANDI Chat</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Chat navigation">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">A</div>
          <div>
            <h1>ANDI</h1>
            <p>Knowledge chatbot</p>
          </div>
        </div>

        <button class="new-chat" id="newChatButton" type="button">
          <span aria-hidden="true">+</span>
          New chat
        </button>

        <div class="sidebar-section">
          <p class="section-label">Chats</p>
          <button class="history-item active" type="button">Current session</button>
        </div>

        <section class="ingest-panel" aria-labelledby="ingestTitle">
          <div>
            <p class="section-label">Developer</p>
            <h2 id="ingestTitle">Knowledge ingest</h2>
          </div>

          <form id="ingestForm" class="ingest-form">
            <label for="knowledgeInput">Add source text</label>
            <textarea
              id="knowledgeInput"
              name="content"
              rows="8"
              placeholder="Paste product docs, policies, FAQs, or support notes..."
            ></textarea>
            <button class="ingest-button" type="submit">Ingest knowledge</button>
            <p class="ingest-status" id="ingestStatus" role="status"></p>
          </form>
        </section>
      </aside>

      <section class="chat-panel" aria-label="AI chat">
        <header class="chat-header">
          <div>
            <h2>ANDI</h2>
            <p>Ask questions across your ingested knowledge.</p>
          </div>
          <div class="status-pill">
            <span aria-hidden="true"></span>
            Online
          </div>
        </header>

        <div class="messages" id="messages" aria-live="polite">
          <article class="message assistant">
            <div class="avatar" aria-hidden="true">AI</div>
            <div class="bubble">
              <p>Hello. Ask me anything from your ingested documents.</p>
            </div>
          </article>
        </div>

        <form class="composer" id="chatForm">
          <label class="sr-only" for="messageInput">Message</label>
          <div class="composer-box">
            <textarea
              id="messageInput"
              name="message"
              rows="1"
              placeholder="Message ANDI"
              autocomplete="off"
            ></textarea>
            <button class="send-button" type="submit" aria-label="Send message">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 4 5 11l1.4 1.4 4.6-4.6V20h2V7.8l4.6 4.6L19 11l-7-7Z" />
              </svg>
            </button>
          </div>
        </form>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
