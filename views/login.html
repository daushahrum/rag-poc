<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in</title>
  <link rel="icon" href="/assets/icons/andi_favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/css/eva-icons/style/eva-icons.css">
  <link rel="stylesheet" href="/css/login.css" />
</head>
<body>

  <!-- LEFT -->
  <div class="left-panel">
    <canvas class="particle-field" id="particleField" aria-hidden="true"></canvas>

    <div class="left-copy">
      <h2><span>Automate</span> your customer<br>service experience</h2>
      <p>Upload. Ingest. Retrieve</p>
    </div>

    <div class="left-footer">© 2026 AMAST. All rights reserved.</div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="login-box">
      <div class="login-mark" aria-label="ANDI">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="login-heading">
        <h1>Welcome back!</h1>
        <p>Sign in to your account to continue.</p>
      </div>

      <form class="login-form" id="loginForm" novalidate>
        <div class="field">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@company.com"
            autocomplete="email"
            required
          />
        </div>
        <div class="field">
          <div class="field-row">
            <label for="password">Password</label>
            <a href="/forgot-password" class="forgot-link">Forgot password?</a>
          </div>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <div class="error-msg" id="errorMsg" role="alert"></div>

        <button type="submit" class="submit-btn" id="submitBtn">Sign in</button>
      </form>
    </div>
  </div>

<script type="module" src="/js/login.js"></script>
</body>
</html>
